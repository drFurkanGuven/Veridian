# Geçici — sadece certbot doğrulaması için (proxy yok, 403 riski azalır)

server {
    listen 80;
    listen [::]:80;
    server_name veridian.furkanguven.space;

    root /var/www/certbot;

    location /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
