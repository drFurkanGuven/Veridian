# HTTPS — api.veridian.furkanguven.space

map $http_upgrade $veridian_connection_upgrade {
    default upgrade;
    ''      close;
}

upstream veridian_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.veridian.furkanguven.space;

    client_max_body_size 100M;

    ssl_certificate     /etc/letsencrypt/live/veridian.furkanguven.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veridian.furkanguven.space/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://veridian_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $veridian_connection_upgrade;
        proxy_read_timeout 86400;
    }
}
