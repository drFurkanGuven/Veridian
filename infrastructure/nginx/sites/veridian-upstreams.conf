# Shared upstreams — tek dosyada tanımlı (duplicate upstream hatası önlenir)

upstream veridian_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream veridian_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

map $http_upgrade $veridian_connection_upgrade {
    default upgrade;
    ''      close;
}
