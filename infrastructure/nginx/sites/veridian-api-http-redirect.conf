# HTTP redirect — api.veridian.furkanguven.space (SSL kurulduktan sonra)

server {
    listen 80;
    listen [::]:80;
    server_name api.veridian.furkanguven.space;

    root /var/www/certbot;

    location /.well-known/acme-challenge/ {
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
