# HTTP redirect — api.veridian.furkanguven.space (SSL kurulduktan sonra)

server {
    listen 80;
    listen [::]:80;
    server_name api.veridian.furkanguven.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
