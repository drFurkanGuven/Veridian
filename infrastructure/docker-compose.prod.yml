name: veridian-prod

services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: veridian-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-veridian}:${POSTGRES_PASSWORD:-veridian}@postgres:5432/${POSTGRES_DB:-veridian}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-veridian}:${RABBITMQ_PASSWORD:-veridian}@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
    ports:
      - '${API_PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - veridian-net

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    container_name: veridian-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      - api
    networks:
      - veridian-net

  nginx:
    image: nginx:1.27-alpine
    container_name: veridian-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    networks:
      - veridian-net

  postgres:
    ports: []

  redis:
    ports: []

  rabbitmq:
    ports:
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'

  minio:
    ports:
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
